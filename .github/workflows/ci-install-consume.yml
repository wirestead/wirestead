name: CI - install & consume

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-test-install-consume:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v7

      - name: Set up C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config
          
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            sudo apt-get install -y clang-18
            echo "CC=clang-18" >> $GITHUB_ENV
            echo "CXX=clang++-18" >> $GITHUB_ENV
          fi

      - name: Install dependencies with vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: x64-linux

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/unilink-install" \
            -DUNILINK_ENABLE_INSTALL=ON \
            -DUNILINK_ENABLE_PKGCONFIG=ON \
            -DUNILINK_ENABLE_EXPORT_HEADER=ON \
            -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

      - name: Build
        run: cmake --build build --config Release -- -v

      - name: Install
        run: cmake --install build --prefix "$RUNNER_TEMP/unilink-install"

      - name: Consume as package (find_package)
        run: |
          install_prefix="$RUNNER_TEMP/unilink-install"
          mkdir -p "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.12)
          project(consumer CXX)
          set(CMAKE_CXX_STANDARD 20)
          find_package(unilink CONFIG REQUIRED)
          if(NOT TARGET unilink::unilink)
            message(FATAL_ERROR "Expected installed package to provide unilink::unilink")
          endif()
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE unilink::unilink)
          EOF
          cat > main.cpp <<'EOF'
          #include <unilink/unilink.hpp>
          #include <iostream>
          int main(){ 
            unilink::diagnostics::Logger::instance().set_console_output(false);
            unilink::diagnostics::Logger::instance().set_level(unilink::diagnostics::LogLevel::INFO);
            std::cout << "unilink package consumed successfully!\n"; 
            return 0; 
          }
          EOF
          cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$install_prefix" \
            -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET
          cmake --build build --config Release
          ./build/consumer

      - name: Test pkg-config
        run: |
          # unilink.pc's Requires.private now names spdlog's own .pc module
          # (jwsung91/unilink#514) when spdlog is external, as vcpkg's spdlog
          # port always is here - pkg-config needs that module's directory on
          # the search path too, not just unilink's own install prefix.
          export PKG_CONFIG_PATH="$RUNNER_TEMP/unilink-install/lib/pkgconfig:$VCPKG_ROOT/installed/$VCPKG_TARGET_TRIPLET/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          echo "Testing pkg-config integration..."
          pkg-config --cflags --libs unilink
          echo "pkg-config test completed successfully!"
