name: CMake

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          # Matrix for Pure C++ (existing configuration)
          - name: C++ (Linux, GCC)
            os: ubuntu-24.04
            triplet: x64-linux
            cc: gcc
            cxx: g++
            generator: Ninja
            build_type: Release
          - name: C++ (Linux ARM64, GCC, Ubuntu 24.04)
            os: ubuntu-24.04-arm
            triplet: arm64-linux
            cc: gcc
            cxx: g++
            generator: Ninja
            build_type: Release
          - name: C++ (Linux, GCC, Ubuntu 22.04)
            os: ubuntu-22.04
            triplet: x64-linux
            cc: gcc
            cxx: g++
            generator: Ninja
            build_type: Release
          - name: C++ (Windows, MSVC)
            os: windows-2022
            triplet: x64-windows-static-md
            cc: cl
            cxx: cl
            generator: "Visual Studio 17 2022"
            build_type: Release
          - name: C++ (macOS, Clang)
            os: macos-15
            triplet: arm64-osx
            cc: /opt/homebrew/opt/llvm/bin/clang
            cxx: /opt/homebrew/opt/llvm/bin/clang++
            generator: Ninja
            build_type: Release

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      BUILD_TYPE: ${{ matrix.build_type }}
      VCPKG_USE_SYSTEM_BINARIES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Export GitHub Actions Cache Environment Variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Build Dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ca-certificates
            
            # Install build tools (default GCC is pre-installed; install explicit compilers only when needed)
            EXTRA_PKGS=""
            if [[ "${{ matrix.cc }}" == "clang"* ]]; then
              EXTRA_PKGS="${{ matrix.cc }} ${{ matrix.cxx }}"
            fi
            sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool libtool-bin pkg-config $EXTRA_PKGS
          else
            brew install ninja autoconf autoconf-archive automake libtool pkg-config llvm
          fi

      - name: Install dependencies with vcpkg (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: ${{ matrix.triplet }}
          packages: boost-asio boost-system spdlog

      - name: Install dependencies with vcpkg (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-vcpkg
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with:
          triplet: ${{ matrix.triplet }}
          packages: boost-asio boost-system spdlog

      - name: Clone vcpkg
        if: runner.os == 'Windows'
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git "${{ env.VCPKG_ROOT }}"

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${env:VCPKG_ROOT}\bootstrap-vcpkg.bat"

      - name: Create Custom Triplet (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tripletPath = Join-Path "${{ env.VCPKG_ROOT }}" "triplets/x64-windows-static-md.cmake"
          Set-Content -Path $tripletPath -Value @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          "@
          Write-Host "Created custom triplet at $tripletPath"
          Get-Content $tripletPath

      - name: Install Dependencies (vcpkg)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_EXE="${VCPKG_ROOT}/vcpkg.exe"

          # Helper function for retrying commands
          retry_command() {
            local retries=3
            local count=0
            until "$@"; do
              exit_code=$?
              count=$((count + 1))
              if [ $count -lt $retries ]; then
                echo "Command failed with exit code $exit_code. Retrying ($count/$retries) in 10s..."
                sleep 10
              else
                echo "Command failed with exit code $exit_code after $retries attempts."
                return $exit_code
              fi
            done
            return 0
          }

          retry_command "$VCPKG_EXE" install boost-system boost-asio spdlog --triplet ${{ matrix.triplet }}

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DWIRESTEAD_BUILD_DOCS=OFF \
            -DWIRESTEAD_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE="${CMAKE_TOOLCHAIN_FILE}" \
            -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          SDK_VER=$(xcrun --sdk macosx --show-sdk-version)
          echo "macOS SDK version: $SDK_VER"
          export MACOSX_DEPLOYMENT_TARGET="$SDK_VER"

          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$SDK_VER" \
            -DWIRESTEAD_BUILD_DOCS=OFF \
            -DWIRESTEAD_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE="${CMAKE_TOOLCHAIN_FILE}" \
            -DVCPKG_TARGET_TRIPLET="${VCPKG_TARGET_TRIPLET}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "${{ matrix.generator }}" -A x64 `
            -DCMAKE_BUILD_TYPE="${env:BUILD_TYPE}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DWIRESTEAD_BUILD_DOCS=OFF `
            -DWIRESTEAD_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Build unit tests
        if: runner.os == 'Windows'
        run: cmake --build build --target wirestead_unit_tests --config "${BUILD_TYPE}"

      - name: Test (Windows, Full C++)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: ctest -C "${env:BUILD_TYPE}" --output-on-failure

      - name: Test (Linux/macOS, Full C++)
        if: runner.os != 'Windows'
        working-directory: build
        run: ctest --output-on-failure --parallel 2
