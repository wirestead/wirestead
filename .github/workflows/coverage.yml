name: Code Coverage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  coverage:
    name: Code Coverage Analysis
    runs-on: ubuntu-24.04
    outputs:
      coverage_percent: ${{ steps.coverage.outputs.percentage }}
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            lcov \
            ninja-build

          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Install dependencies with vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          triplet: x64-linux

      - name: Configure with coverage
        run: |
          cmake -S . -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage -fprofile-update=atomic" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage -fprofile-update=atomic" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DUNILINK_ENABLE_CONFIG=ON \
            -DUNILINK_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE \
            -DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET

      - name: Build with coverage
        run: cmake --build build-coverage -j $(nproc)

      - name: Run tests
        run: |
          cd build-coverage
          ctest --output-on-failure --parallel 2 -LE "performance|benchmark|optional"

      - name: Generate coverage report
        run: |
          cd build-coverage

          # Capture coverage data
          lcov --directory . --capture --output-file coverage.info \
            --ignore-errors mismatch,negative,unused \
            --rc lcov_branch_coverage=1

          # Debug: Show total coverage before filtering
          echo "=== Before filtering ==="
          lcov --summary coverage.info --rc lcov_branch_coverage=1 2>&1 | grep lines

          # Step 1: Extract unilink directory using absolute path
          echo "=== Step 1: Extract unilink directory ==="
          lcov --extract coverage.info \
            "${GITHUB_WORKSPACE}/unilink/*" \
            --output-file coverage_temp.info \
            --ignore-errors mismatch,negative,unused \
            --rc lcov_branch_coverage=1
          lcov --summary coverage_temp.info --rc lcov_branch_coverage=1 2>&1 | grep lines

          # Step 2: Remove unwanted files (test, _deps, build)
          echo "=== Step 2: Remove test and dependency files ==="
          lcov --remove coverage_temp.info \
            "*/test/*" \
            "*/_deps/*" \
            "*/build-coverage/*" \
            --output-file coverage_filtered.info \
            --ignore-errors mismatch,negative,unused \
            --rc lcov_branch_coverage=1

          # Debug: Show coverage after filtering
          echo "=== After filtering ==="
          lcov --summary coverage_filtered.info --rc lcov_branch_coverage=1 2>&1 | grep lines

          # Debug: Show filtered files
          echo "=== Filtered files (first 30) ==="
          lcov --list coverage_filtered.info --rc lcov_branch_coverage=1 2>&1 | head -30

          # Generate summary
          lcov --list coverage_filtered.info --rc lcov_branch_coverage=1 > coverage_summary.txt

          # Generate HTML report
          genhtml coverage_filtered.info --output-directory coverage_html \
            --title "unilink Coverage Report" \
            --legend --show-details \
            --branch-coverage \
            --rc lcov_branch_coverage=1

      - name: Calculate coverage percentage
        id: coverage
        run: |
          cd build-coverage
          COVERAGE=$(lcov --summary coverage_filtered.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "### 📊 Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat coverage_summary.txt | tail -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build-coverage/coverage_html
          retention-days: 30
          overwrite: true

      - name: Upload Coverage Data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data
          path: |
            build-coverage/coverage_filtered.info
            build-coverage/coverage_summary.txt
          retention-days: 30
          overwrite: true

      - name: Save PR Info for Comment
        if: github.event_name == 'pull_request'
        run: |
          echo ${{ github.event.pull_request.number }} > build-coverage/pr_number.txt
          echo ${{ steps.coverage.outputs.percentage }} > build-coverage/coverage_percent.txt

      - name: Upload HTML Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build-coverage/coverage_html
          retention-days: 30
          overwrite: true

      - name: Upload Coverage Data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data
          path: |
            build-coverage/coverage_filtered.info
            build-coverage/coverage_summary.txt
            build-coverage/pr_number.txt        
            build-coverage/coverage_percent.txt
          retention-days: 30
          overwrite: true

      - name: Coverage Check
        run: |
          cd build-coverage
          COVERAGE=$(lcov --summary coverage_filtered.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"

          # Set minimum coverage threshold (adjust as needed)
          THRESHOLD=65

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

  deploy-coverage:
    name: Deploy Coverage to GitHub Pages
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: ./build-coverage/coverage_html
      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data
          path: ./build-coverage
      - name: Generate coverage badge JSON
        id: coverage_badge
        run: |
          cd build-coverage
          set -euo pipefail

          # Prefer the value computed in the coverage job; fall back to the artifact files if missing
          COVERAGE_PERCENT="${{ needs.coverage.outputs.coverage_percent }}"
          if [ -z "$COVERAGE_PERCENT" ]; then
            SUMMARY_FILE=$(find . -name "coverage_summary.txt" | head -n 1 || true)
            if [ -n "$SUMMARY_FILE" ]; then
              COVERAGE_PERCENT=$(grep -m1 "lines" "$SUMMARY_FILE" | awk '{print $2}' | tr -d '%') || true
            fi
          fi
          if [ -z "$COVERAGE_PERCENT" ]; then
            echo "⚠️  coverage_percent was empty, defaulting to 0" >&2
            COVERAGE_PERCENT="0"
          fi
          export COVERAGE_PERCENT

          cov_formatted=$(awk -v v="$COVERAGE_PERCENT" 'BEGIN{printf "%.1f", v+0}')

          color="red"
          grade="poor"
          if awk -v v="$COVERAGE_PERCENT" 'BEGIN{exit !(v>=80)}'; then
            color="blue"
            grade="excellent"
          elif awk -v v="$COVERAGE_PERCENT" 'BEGIN{exit !(v>=60)}'; then
            color="green"
            grade="good"
          elif awk -v v="$COVERAGE_PERCENT" 'BEGIN{exit !(v>=40)}'; then
            color="yellow"
            grade="fair"
          fi

          mkdir -p coverage_html/badges
          cat > coverage_html/badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "test coverage",
            "message": "${cov_formatted}%",
            "color": "${color}"
          }
          EOF

          {
            echo "coverage_percent=${cov_formatted}"
            echo "coverage_grade=${grade}"
            echo "coverage_color=${color}"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Coverage badge JSON created: ${cov_formatted}% (${grade}, ${color})"

      - name: Create index page
        run: |
          cd build-coverage/coverage_html
          COVERAGE="${{ steps.coverage_badge.outputs.coverage_percent }}%"
          GRADE="${{ steps.coverage_badge.outputs.coverage_grade }}"
          if [ -f index.html ]; then
            mv index.html index-original.html
          fi
          cat > index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>unilink Coverage Report</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                margin: 0;
                padding: 20px;
                background: #f5f5f5;
              }
              .container {
                max-width: 1200px;
                margin: 0 auto;
                background: white;
                padding: 40px;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
              }
              h1 { color: #333; margin-bottom: 10px; }
              .coverage { font-size: 48px; font-weight: bold; color: #4CAF50; margin: 20px 0; }
              .grade { font-size: 24px; color: #666; margin: 10px 0; text-transform: uppercase; }
              .badge { margin: 20px 0; }
              .links { margin-top: 30px; }
              .link { 
                display: inline-block;
                padding: 12px 24px;
                background: #2196F3;
                color: white;
                text-decoration: none;
                border-radius: 4px;
                margin-right: 10px;
              }
              .link:hover { background: #1976D2; }
              .timestamp { color: #666; font-size: 14px; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎯 unilink Code Coverage</h1>
              <p class="timestamp">Generated: $(date '+%Y-%m-%d %H:%M:%S UTC')</p>
              <div class="coverage">Coverage: ${COVERAGE}</div>
              <div class="grade">Grade: ${GRADE}</div>
              <div class="badge">
                <img src="https://img.shields.io/endpoint?url=https://jwsung91.github.io/unilink/coverage/badges/coverage.json" alt="Coverage Badge">
              </div>
              <div class="links">
                <a href="index-original.html" class="link">📊 Detailed Report</a>
                <a href="https://github.com/jwsung91/unilink" class="link">📦 Repository</a>
              </div>
            </div>
          </body>
          </html>
          EOF
          echo "✅ Custom index page created with coverage: ${COVERAGE}"

      # API docs (Doxygen) live in a separate repo (unilink-lab/unilink-docs)
      # since docs generation moved out of this one. GitHub's native
      # actions/deploy-pages can only publish to the Pages site of the repo
      # the workflow is running in, so unilink-docs can't deploy here itself
      # (no supported cross-repo path) - this job checks unilink-docs out as
      # a source dependency instead and generates docs from *this* exact
      # commit, then combines them with the coverage report into one
      # artifact before the single deploy-pages call below.
      - name: Checkout unilink-docs
        uses: actions/checkout@v7
        with:
          repository: unilink-lab/unilink-docs
          path: docs-src

      - name: Checkout unilink core for docs generation
        uses: actions/checkout@v7
        with:
          path: docs-src/external/unilink

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate API reference
        working-directory: docs-src
        run: ./scripts/generate_docs.sh

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r docs-src/build/doxygen/html/. site/
          mkdir -p site/coverage
          cp -r build-coverage/coverage_html/. site/coverage/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
